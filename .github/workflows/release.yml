name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for Raspberry Pi (ARM64)
        run: |
          VERSION=${GITHUB_REF_NAME} scripts/build-release-arm64.sh raku-sika-hub-linux-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            raku-sika-hub-linux-arm64
            raku-sika-hub-linux-arm64.sha256
          generate_release_notes: true
